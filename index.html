<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花朵数字消消乐</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:"微软雅黑"; }
        body { background:#FFF9E8; padding:20px; text-align:center; }
        h1 { color:#FF6B8B; margin:20px 0; }
        /* 页面控制 */
        #info { display:block; }
        #level { display:none; }
        #game { display:none; }
        /* 表单 */
       .form { max-width:400px; margin:0 auto; background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px #FFD1DC; }
       .form p { margin:15px 0; text-align:left; }
       .form label { color:#4CAF50; font-weight:bold; }
       .form input { width:100%; padding:10px; margin-top:5px; border:2px solid #FFC107; border-radius:8px; }
        /* 按钮 */
       .btn { padding:15px 40px; font-size:20px; background:#FF9800; color:white; border:none; border-radius:30px; cursor:pointer; margin:10px; }
        /* 难度选择 */
       .level-box { display:flex; justify-content:center; gap:20px; margin:30px 0; flex-wrap:wrap; }
       .level-card { width:150px; background:white; padding:15px; border:3px solid #FF6B8B; border-radius:10px; cursor:pointer; }
        /* 游戏区 */
       .timer { font-size:22px; color:#E53935; font-weight:bold; margin:15px 0; }
       .game-board { max-width:800px; margin:0 auto; background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px #FFD1DC; display:grid; gap:10px; justify-content:center; }
        /* 花朵卡片 */
       .flower { 
            width:100px; height:100px; border:2px solid; border-radius:8px; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; 
            cursor:pointer; transition:all 0.2s;
        }
       .flower.red { background:#FFF0F2; border-color:#FF6B8B; }
       .flower.yellow { background:#FFFBEB; border-color:#FFD700; }
       .flower-icon { font-size:35px; color:#FF6B8B; }
       .flower-num { font-size:24px; color:#E53935; }
       .flower.selected { border-color:#4CAF50; box-shadow:0 0 10px #81C784; }
       .flower.hide { opacity:0; pointer-events:none; transform:scale(0.9); }
        /* 通关弹窗：重点优化——中间大文字 */
       .win { 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.6); display:none; 
            flex-direction:column; /* 垂直排列 */
            align-items:center; justify-content:center; /* 完全居中 */
            z-index:999;
        }
        /* 正中间的“太棒了” */
       .win-title { 
            font-size:80px; color:#FFD700; font-weight:bold; 
            text-shadow:0 0 15px #FF6B8B; margin-bottom:20px;
        }
        /* 弹窗内容区 */
       .win-box { 
            background:white; padding:30px 50px; border-radius:15px; 
            text-align:center;
        }
       .win-box p { font-size:22px; color:#333; margin:20px 0; }
    </style>
</head>
<body>
    <!-- 1. 信息页 -->
    <div id="info">
        <h1>🌸 花朵数字消消乐 🌸</h1>
        <div class="form">
            <p>
                <label>你的名字：</label><br>
                <input type="text" id="name" placeholder="比如：小红">
            </p>
            <button class="btn" onclick="switchPage('info','level')">下一步选难度</button>
        </div>
    </div>

    <!-- 2. 难度页 -->
    <div id="level">
        <h1>选择难度</h1>
        <div class="level-box">
            <div class="level-card" onclick="switchPage('level','game'); loadGame('small')">
                <h3>小班</h3>
                <p>4×4（红4对+黄4对）</p>
            </div>
            <div class="level-card" onclick="switchPage('level','game'); loadGame('medium')">
                <h3>中班</h3>
                <p>4×6（红6对+黄6对）</p>
            </div>
            <div class="level-card" onclick="switchPage('level','game'); loadGame('large')">
                <h3>大班</h3>
                <p>4×10（红10对+黄10对）</p>
            </div>
        </div>
        <button class="btn" onclick="switchPage('level','info')">返回填信息</button>
    </div>

    <!-- 3. 游戏页 -->
    <div id="game">
        <h1>开始游戏！</h1>
        <div class="timer">用时：<span id="time">00:00</span></div>
        <div class="game-board" id="board"></div>
        <button class="btn" onclick="restartGame()">重新玩</button>
        <button class="btn" onclick="switchPage('game','level')">换难度</button>
    </div>

    <!-- 通关弹窗：新增中间大文字“太棒了” -->
    <div class="win" id="win">
        <!-- 屏幕正中间的标题 -->
        <div class="win-title">太棒了</div>
        <!-- 下方的详情弹窗 -->
        <div class="win-box">
            <p>全部花朵已消除！</p>
            <p>用时：<span id="finalTime">00:00</span></p>
            <button class="btn" onclick="document.getElementById('win').style.display='none'">再玩一次</button>
        </div>
    </div>

    <script>
        // 全局变量
        let currentLevel = '';
        let timer = null;
        let startTimestamp = 0;
        let totalPairsPerColor = 0;
        let matchedRedPairs = 0;
        let matchedYellowPairs = 0;
        let firstSelected = null;

        // 页面切换
        function switchPage(hideId, showId) {
            document.getElementById(hideId).style.display = 'none';
            document.getElementById(showId).style.display = 'block';
        }

        // 生成同色完整数字对
        function getColorMatchedNums(pairCount) {
            const sum10Pairs = [[1,9], [2,8], [3,7], [4,6], [5,5]];
            const nums = [];
            for (let i = 0; i < pairCount; i++) {
                const pairIndex = i % sum10Pairs.length;
                nums.push(sum10Pairs[pairIndex][0], sum10Pairs[pairIndex][1]);
            }
            return shuffleArray(nums);
        }

        // 随机打乱数组
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // 加载游戏
        function loadGame(level) {
            currentLevel = level;
            const board = document.getElementById('board');
            board.innerHTML = '';
            matchedRedPairs = 0;
            matchedYellowPairs = 0;
            firstSelected = null;

            let gridCols;
            if (level === 'small') {
                gridCols = 'repeat(4, 100px)';
                totalPairsPerColor = 4;
            } else if (level === 'medium') {
                gridCols = 'repeat(6, 100px)';
                totalPairsPerColor = 6;
            } else {
                gridCols = 'repeat(10, 80px)';
                totalPairsPerColor = 10;
            }
            board.style.gridTemplateColumns = gridCols;

            const redNums = getColorMatchedNums(totalPairsPerColor);
            const yellowNums = getColorMatchedNums(totalPairsPerColor);
            const allFlowers = [];
            redNums.forEach(num => allFlowers.push({ color: 'red', num: num }));
            yellowNums.forEach(num => allFlowers.push({ color: 'yellow', num: num }));
            const shuffledFlowers = shuffleArray(allFlowers);

            shuffledFlowers.forEach(flowerData => {
                const flower = document.createElement('div');
                flower.className = `flower ${flowerData.color}`;
                flower.dataset.color = flowerData.color;
                flower.dataset.num = flowerData.num;
                flower.innerHTML = `
                    <div class="flower-icon">🌸</div>
                    <div class="flower-num">${flowerData.num}</div>
                `;

                flower.onclick = function() {
                    if (this.classList.contains('hide')) return;

                    if (!firstSelected) {
                        firstSelected = this;
                        firstSelected.classList.add('selected');
                    } else if (firstSelected!== this) {
                        const isSameColor = firstSelected.dataset.color === this.dataset.color;
                        const isSum10 = parseInt(firstSelected.dataset.num) + parseInt(this.dataset.num) === 10;

                        if (isSameColor && isSum10) {
                            firstSelected.classList.add('hide');
                            this.classList.add('hide');
                            if (flowerData.color === 'red') matchedRedPairs++;
                            else matchedYellowPairs++;

                            // 所有花朵消除→显示通关效果
                            if (matchedRedPairs >= totalPairsPerColor && matchedYellowPairs >= totalPairsPerColor) {
                                clearInterval(timer);
                                document.getElementById('finalTime').textContent = document.getElementById('time').textContent;
                                document.getElementById('win').style.display = 'flex'; // 显示居中文字
                            }
                        }

                        firstSelected.classList.remove('selected');
                        firstSelected = null;
                    } else {
                        firstSelected.classList.remove('selected');
                        firstSelected = null;
                    }
                };

                board.appendChild(flower);
            });

            startTimestamp = Date.now();
            clearInterval(timer);
            timer = setInterval(updateTimer, 1000);
        }

        // 计时器更新
        function updateTimer() {
            const elapsedSec = Math.floor((Date.now() - startTimestamp) / 1000);
            const min = Math.floor(elapsedSec / 60).toString().padStart(2, '0');
            const sec = (elapsedSec % 60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${min}:${sec}`;
        }

        // 重新开始游戏
        function restartGame() {
            loadGame(currentLevel);
        }
    </script>
</body>
</html>
