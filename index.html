<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>触屏贪吃蛇</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
  body{
    background:#1a1a1a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    flex-direction:column;
    color:#fff;
  }
  #score{font-size:24px;margin-bottom:10px}
  #game{
    border:3px solid #4CAF50;
    background:#111;
    display:block;
  }
  .tips{margin-top:8px;font-size:14px;color:#aaa}
</style>
</head>
<body>
<div id="score">得分: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<div class="tips">电脑：方向键 | 手机：上下左右滑动</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const grid = 20;
const count = canvas.width / grid;

let snake = [{x: 10, y: 10}];
let dx = 1;
let dy = 0;
let food = {};
let score = 0;

let touchStartX = 0;
let touchStartY = 0;

function randomFood() {
  food.x = Math.floor(Math.random() * count);
  food.y = Math.floor(Math.random() * count);
  snake.forEach(s => {
    if (s.x === food.x && s.y === food.y) randomFood();
  });
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#4CAF50';
  snake.forEach(s => {
    ctx.fillRect(s.x*grid, s.y*grid, grid-2, grid-2);
  });

  ctx.fillStyle = '#ff4444';
  ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);
}

function move() {
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};

  if (head.x < 0 || head.x >= count || head.y < 0 || head.y >= count) {
    alert('游戏结束！得分：'+score);
    reset();
    return;
  }

  snake.forEach(s => {
    if (s.x === head.x && s.y === head.y) {
      alert('游戏结束！得分：'+score);
      reset();
    }
  });

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 1;
    scoreEl.textContent = '得分: ' + score;
    randomFood();
  } else {
    snake.pop();
  }
}

function reset() {
  snake = [{x:10,y:10}];
  dx = 1; dy = 0;
  score = 0;
  scoreEl.textContent = '得分: 0';
  randomFood();
}

// 键盘
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
  else if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
  else if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
  else if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
});

// 触屏
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

document.addEventListener('touchmove', e => {
  e.preventDefault();
});

document.addEventListener('touchend', e => {
  if (!touchStartX || !touchStartY) return;

  const endX = e.changedTouches[0].clientX;
  const endY = e.changedTouches[0].clientY;

  const diffX = endX - touchStartX;
  const diffY = endY - touchStartY;

  if (Math.abs(diffX) > Math.abs(diffY)) {
    if (diffX > 0 && dx !== -1) { dx = 1; dy = 0; }
    else if (diffX < 0 && dx !== 1) { dx = -1; dy = 0; }
  } else {
    if (diffY > 0 && dy !== -1) { dx = 0; dy = 1; }
    else if (diffY < 0 && dy !== 1) { dx = 0; dy = -1; }
  }

  touchStartX = 0;
  touchStartY = 0;
});

function game() {
  move();
  draw();
}

randomFood();
setInterval(game, 120);
</script>
</body>
</html>
